<div class="grid grid-cols-1 md:grid-cols-2 gap-5">

<span class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Full Name</span>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">person</span>
<input class="w-full rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 py-3 pl-10 pr-4 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" placeholder="John Doe" type="text"/>
</div>
</label>
<label class="flex flex-col gap-2">
<span class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Institutional ID</span>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">badge</span>

</div>
</label>
</div>
<label class="flex flex-col gap-2">
<span class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Email Address</span>

<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">mail</span>
<input class="w-full rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 py-3 pl-10 pr-4 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" placeholder="name@institution.edu" type="email"/>
</div>
</label>
<div class="flex flex-col gap-2">
<span class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Role Selection</span>
<div class="grid grid-cols-2 gap-4">
<label class="relative flex cursor-pointer items-center justify-center rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 p-4 transition-all hover:border-primary has-[:checked]:border-primary has-[:checked]:bg-primary/5">
<input checked="" class="sr-only peer" name="role" type="radio" value="student"/>
<div class="flex flex-col items-center gap-1">
<span class="material-symbols-outlined text-primary text-2xl">school</span>
<span class="text-sm font-bold">Student</span>
</div>
</label>
<label class="relative flex cursor-pointer items-center justify-center rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 p-4 transition-all hover:border-primary has-[:checked]:border-primary has-[:checked]:bg-primary/5">
<input class="sr-only peer" name="role" type="radio" value="faculty"/>
<div class="flex flex-col items-center gap-1">
<span class="material-symbols-outlined text-primary text-2xl">work</span>
<span class="text-sm font-bold">Faculty</span>
</div>
</label>
</div>

<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">lock</span>

<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl cursor-pointer">visibility_off</span>
</div>
</label>
<div class="flex items-center gap-2 pt-2">

<button class="w-full bg-primary text-white font-bold py-4 rounded-lg hover:bg-primary/90 transition-all shadow-lg shadow-primary/20 mt-4" type="submit">
